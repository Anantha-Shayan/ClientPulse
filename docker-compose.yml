services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: clientpulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - postgres
      - mongo
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://user:password@postgres:5432/clientpulse
      MONGO_URI: mongodb://mongo:27017/clientpulse_logs
      JWT_SECRET: change_this_to_a_very_long_secret_for_demo
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:5173
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 500
      AUTH_RATE_LIMIT_MAX: 20
      TRUST_PROXY: "false"
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:5000/api/v1
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
  mongo_data:
